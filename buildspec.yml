version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 919010206785.dkr.ecr.us-east-1.amazonaws.com
      - IMAGE_TAG=latest
  build:
    commands:
      - echo Building the Docker image...
      - docker build --platform linux/amd64 -t calendly .
      - docker tag calendly:latest 919010206785.dkr.ecr.us-east-1.amazonaws.com/calendly:latest
  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push 919010206785.dkr.ecr.us-east-1.amazonaws.com/calendly:latest
      - echo Build completed successfully.

artifacts:
  files: []
